<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma de Flujos Procesales</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:1.5rem}
.header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid #e2e0d8}
.logo{width:36px;height:36px;background:#185FA5;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:20px;height:20px;fill:white}
.title{font-size:20px;font-weight:600;color:#1a1a18}
.subtitle{font-size:13px;color:#888780;margin-top:2px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.tab{padding:6px 14px;font-size:13px;border:1px solid #d3d1c7;border-radius:20px;cursor:pointer;background:white;color:#5f5e5a;transition:all .15s;user-select:none}
.tab.active{background:#185FA5;color:white;border-color:#185FA5;font-weight:500}
.tab:hover:not(.active){border-color:#888780;color:#1a1a18}
.search-section{background:white;border:1px solid #d3d1c7;border-radius:10px;padding:1rem;margin-bottom:.75rem}
.search-label{font-size:11px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.ai-row{display:flex;gap:8px;margin-bottom:0}
.ai-row input{flex:1;padding:9px 14px;border:1px solid #d3d1c7;border-radius:8px;font-size:14px;background:#f9f8f5;color:#1a1a18;outline:none}
.ai-row input:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1);background:white}
.ai-row button{padding:9px 18px;background:#185FA5;color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;transition:background .15s}
.ai-row button:hover{background:#0C447C}
.ai-row button:disabled{background:#b4b2a9;cursor:not-allowed}
.ai-response{margin-top:.75rem;padding:.75rem 1rem;background:#f0f6ff;border-radius:8px;display:none}
.ai-response.visible{display:block}
.ai-label{font-size:11px;font-weight:600;color:#185FA5;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.gemini-badge{background:#E6F1FB;color:#185FA5;padding:2px 8px;border-radius:10px;font-size:11px}
.ai-text{font-size:14px;color:#1a1a18;line-height:1.7;white-space:pre-wrap}
.loading{display:flex;align-items:center;gap:8px;color:#888780;font-size:13px}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#185FA5;animation:bounce .9s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
.divider{height:1px;background:#e2e0d8;margin:.75rem 0}
.filter-label{font-size:11px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.filter-row input{flex:1;min-width:180px;padding:7px 12px;border:1px solid #d3d1c7;border-radius:8px;font-size:13px;background:#f9f8f5;color:#1a1a18;outline:none}
.filter-row input:focus{border-color:#185FA5;background:white}
.filter-row select{padding:7px 10px;font-size:13px;border:1px solid #d3d1c7;border-radius:8px;background:#f9f8f5;color:#1a1a18;cursor:pointer;outline:none}
.filter-row select:focus{border-color:#185FA5}
.bar{display:flex;align-items:center;margin-bottom:.5rem}
.count{font-size:13px;color:#888780}
.table-wrap{border:1px solid #d3d1c7;border-radius:10px;overflow:hidden;background:white}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{background:#f1efe8;font-weight:600;color:#5f5e5a;text-align:left;padding:9px 11px;border-bottom:1px solid #d3d1c7;font-size:12px}
td{padding:8px 11px;color:#1a1a18;border-bottom:1px solid #e8e6de;vertical-align:top;overflow:hidden;text-overflow:ellipsis}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9f8f5}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.b-ley{background:#E6F1FB;color:#0C447C}
.b-conv{background:#EAF3DE;color:#27500A}
.b-res{background:#FAEEDA;color:#633806}
.b-abog{background:#F1EFE8;color:#444441}
.b-cid{background:#EEEDFE;color:#3C3489}
.col-inst{width:17%}.col-etapa{width:13%}.col-tarea{width:30%}.col-cierra{width:9%}.col-tipo{width:14%}.col-plazo{width:7%}.col-bit{width:15%}
.empty{text-align:center;padding:3rem;color:#888780;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div>
    <div><div class="title">Plataforma de Flujos Procesales</div><div class="subtitle">Consulta inteligente de tareas procesales laborales</div></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="search-section">
    <div class="search-label">Pregunta a la IA</div>
    <div class="ai-row">
      <input type="text" id="aiInput" placeholder="Ej: ¿Cuántos días tengo para el recurso de queja?" />
      <button id="aiBtn" onclick="aiSearch()">Preguntar ↗</button>
    </div>
    <div class="ai-response" id="aiResponse">
      <div class="ai-label">Respuesta <span class="gemini-badge">Gemini</span></div>
      <div id="aiText" class="ai-text"></div>
    </div>

    <div class="divider"></div>

    <div class="filter-label">Buscar y filtrar</div>
    <div class="filter-row">
      <input type="text" id="searchInput" placeholder="Buscar en la tabla..." oninput="filterTable()" />
      <select id="fInstancia" onchange="filterTable()"><option value="">Todas las instancias</option></select>
      <select id="fEtapa" onchange="filterTable()"><option value="">Todas las etapas</option></select>
      <select id="fCierra" onchange="filterTable()"><option value="">Cierra por</option></select>
      <select id="fTipo" onchange="filterTable()"><option value="">Tipo de plazo</option></select>
    </div>
  </div>

  <div class="bar"><span class="count" id="resultsCount"></span></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-inst">Instancia</th>
          <th class="col-etapa">Etapa</th>
          <th class="col-tarea">Tarea</th>
          <th class="col-cierra">Cierra</th>
          <th class="col-tipo">Tipo plazo</th>
          <th class="col-plazo">Plazo</th>
          <th class="col-bit">Bitácora</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

const SHEET_NAMES = Object.keys(ALL_DATA);
let currentSheet = SHEET_NAMES[0];

function getCierra(r){return r["Cierra la Tarea"]||r["Cierra la tarea"]||"";}
function getTipo(r){return r["Tipo de plazo (Ley/Resolución/Acuse/Abogado)"]||"";}
function getBit(r){return r["Bitácora"]||r["BITÁCORA"]||"";}
function getTarea(r){return r["Tarea"]||r["TAREA"]||"";}

function badgeCierra(v){if(!v)return"";const c=v==="CID"?"b-cid":"b-abog";return`<span class="badge ${c}">${v}</span>`;}
function badgeTipo(v){if(!v)return"";const t=v.trim().toLowerCase();let c="b-abog";if(t==="ley"||t==="ley ")c="b-ley";else if(t==="convenio")c="b-conv";else if(t.includes("resol"))c="b-res";return`<span class="badge ${c}">${v}</span>`;}

function renderTabs(){
  document.getElementById("tabs").innerHTML=SHEET_NAMES.map(s=>`<div class="tab${s===currentSheet?" active":""}" onclick="switchSheet('${s}')">${s}</div>`).join("");
}
function switchSheet(name){
  currentSheet=name;
  renderTabs();
  populateFilters();
  filterTable();
  document.getElementById("aiResponse").classList.remove("visible");
}
function getRows(){return ALL_DATA[currentSheet]||[];}

function populateFilters(){
  const rows=getRows();
  const unique=(fn)=>[...new Set(rows.map(fn).filter(Boolean))].sort();
  const fill=(id,opts,def)=>{document.getElementById(id).innerHTML=`<option value="">${def}</option>`+opts.map(v=>`<option>${v}</option>`).join("");;};
  fill("fInstancia",unique(r=>r.Instancia),"Todas las instancias");
  fill("fEtapa",unique(r=>r.Etapa),"Todas las etapas");
  fill("fCierra",unique(r=>getCierra(r)),"Cierra por");
  fill("fTipo",unique(r=>getTipo(r)),"Tipo de plazo");
}

function filterTable(){
  const q=document.getElementById("searchInput").value.toLowerCase().trim();
  const fI=document.getElementById("fInstancia").value;
  const fE=document.getElementById("fEtapa").value;
  const fC=document.getElementById("fCierra").value;
  const fT=document.getElementById("fTipo").value;
  let rows=getRows();
  if(fI)rows=rows.filter(r=>r.Instancia===fI);
  if(fE)rows=rows.filter(r=>r.Etapa===fE);
  if(fC)rows=rows.filter(r=>getCierra(r)===fC);
  if(fT)rows=rows.filter(r=>getTipo(r)===fT);
  if(q)rows=rows.filter(r=>Object.values(r).join(" ").toLowerCase().includes(q));
  renderRows(rows);
}

function renderRows(rows){
  const tb=document.getElementById("tableBody");
  document.getElementById("resultsCount").textContent=`${rows.length} resultado${rows.length!==1?"s":""}`;
  if(!rows.length){tb.innerHTML=`<tr><td colspan="7"><div class="empty">No se encontraron resultados</div></td></tr>`;return;}
  tb.innerHTML=rows.map(r=>`<tr>
    <td title="${r.Instancia||""}">${r.Instancia||""}</td>
    <td title="${r.Etapa||""}">${r.Etapa||""}</td>
    <td title="${getTarea(r)}" style="font-weight:500;white-space:normal">${getTarea(r)}</td>
    <td>${badgeCierra(getCierra(r))}</td>
    <td>${badgeTipo(getTipo(r))}</td>
    <td style="text-align:center">${r.Plazo||""}</td>
    <td title="${getBit(r)}" style="color:#888780;font-size:12px">${getBit(r)}</td>
  </tr>`).join("");
}

async function aiSearch(){
  const q=document.getElementById("aiInput").value.trim();
  if(!q)return;
  const resp=document.getElementById("aiResponse");
  const txt=document.getElementById("aiText");
  const btn=document.getElementById("aiBtn");
  resp.classList.add("visible");
  txt.innerHTML='<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div>&nbsp;Consultando...</div>';
  btn.disabled=true;
  const rows=getRows();
  const sample=rows.map(r=>`[${r.Instancia}][${r.Etapa}] ${getTarea(r)} | Plazo:${r.Plazo}d | ${getTipo(r)} | ${getBit(r)}`).join("\n");
  const prompt=`Eres un asistente jurídico especializado en flujos procesales laborales peruanos (NLPT). El usuario consulta el flujo "${currentSheet}" con ${rows.length} tareas.\n\nDATOS COMPLETOS DEL FLUJO:\n${sample}\n\nPREGUNTA: ${q}\n\nResponde en español, de forma clara y precisa. Menciona los plazos exactos si aplica. Máximo 3 párrafos.`;
  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        generationConfig:{temperature:0.2,maxOutputTokens:800}
      })
    });
    const data=await res.json();
    if(data.candidates&&data.candidates[0]&&data.candidates[0].content){
      txt.textContent=data.candidates[0].content.parts[0].text;
    }else if(data.error){
      txt.textContent="Error: "+data.error.message;
    }else{
      txt.textContent="No se obtuvo respuesta. Intenta de nuevo.";
    }
  }catch(e){
    txt.textContent="Error de conexión: "+e.message;
  }
  btn.disabled=false;
}

document.getElementById("aiInput").addEventListener("keydown",e=>{if(e.key==="Enter")aiSearch();});
renderTabs();populateFilters();filterTable();
</script>
